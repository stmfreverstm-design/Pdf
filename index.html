<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - عرض آمن</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-bg: #1a1a1a;
            --card-bg: #262626;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Amiri', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* زخرفة إسلامية بسيطة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-exercise.png');
            opacity: 0.05;
            z-index: -1;
        }

        #login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--primary-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 400px;
            transition: all 0.5s ease;
        }

        h2 { color: var(--primary-gold); margin-bottom: 25px; font-size: 1.8rem; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: var(--primary-gold); font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        input:focus { outline: none; border-color: var(--primary-gold); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #e2bd76; transform: translateY(-2px); }

        #pdf-main-container { display: none; width: 100%; height: 100vh; flex-direction: column; }
        
        #viewerContainer { 
            flex: 1; 
            overflow: auto; 
            background: #333; 
            padding: 20px 0;
            -webkit-user-select: none; user-select: none;
        }

        canvas {
            display: block;
            margin: 0 auto 20px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 95%;
        }

        #loading-screen { display: none; color: var(--primary-gold); font-size: 1.2rem; }

        @media print { body { display: none !important; } }
    </style>
</head>
<body>

    <div id="login-card">
        <h2>تسجيل الدخول الآمن</h2>
        <div class="input-group">
            <label>اسم المستخدم:</label>
            <input type="text" id="username" placeholder="أدخل اسمك">
        </div>
        <div class="input-group">
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <button onclick="handleLogin()">دخول</button>
        <div id="loading-screen"><br>جاري فتح المصحف الشريف...</div>
    </div>

    <div id="pdf-main-container">
        <div id="viewerContainer">
            <div id="pdf-viewer"></div>
        </div>
    </div>

    <script>
        // --- 1. قائمة المستخدمين (تستطيع تغييرها هنا) ---
        const USERS_LIST = [
            { name: "seif", pass: "123" },
            { name: "tarek", pass: "123" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" },
            { name: "000", pass: "000" }
        ];

        // --- 2. إعدادات الملف ---
        const PDF_URL = 'https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf';
        const PDF_REAL_PASS = '1234567891245248hgdtghnfrdvhb fzedg@#_25D'; // الباسورد المعقد للملف

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // التحقق عند فتح الموقع إذا كان مسجلاً مسبقاً
        window.onload = () => {
            const savedSession = localStorage.getItem('isLoggedIn');
            if (savedSession === 'true') {
                showPDF();
            }
        };

        function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toLowerCase();
            const passIn = document.getElementById('password').value;

            // البحث في قائمة المستخدمين
            const userMatch = USERS_LIST.find(u => u.name.toLowerCase() === userIn && u.pass === passIn);

            if (userMatch) {
                localStorage.setItem('isLoggedIn', 'true'); // حفظ الجلسة
                showPDF();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }

        async function showPDF() {
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            
            try {
                const response = await fetch(PDF_URL);
                const data = await response.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument({
                    data: data,
                    password: PDF_REAL_PASS
                });

                const pdfDoc = await loadingTask.promise;
                document.getElementById('pdf-main-container').style.display = 'flex';
                renderPages(pdfDoc);
            } catch (error) {
                console.error(error);
                alert("خطأ في تحميل الملف. تأكد من الباسورد أو الرابط.");
                localStorage.removeItem('isLoggedIn');
                location.reload();
            }
        }

        async function renderPages(pdfDoc) {
            const viewer = document.getElementById('pdf-viewer');
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                viewer.appendChild(canvas);

                await page.render({ canvasContext: context, viewport: viewport }).promise;
            }
        }

        // منع كليك يمين
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
