<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اقرأ وارتقِ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; font-family: 'Segoe UI', sans-serif; color: white; height: 100%; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg'); background-size: cover; background-position: center; }
        .card { background: rgba(15, 15, 15, 0.85); padding: 40px; border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); width: 380px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .tabs { display: flex; justify-content: center; margin-bottom: 25px; gap: 10px; }
        .tab { padding: 8px 20px; cursor: pointer; color: #777; transition: 0.3s; border-radius: 50px; background: rgba(255,255,255,0.05); }
        .tab.active { color: #000; background: var(--gold); }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; text-align: center; outline: none; user-select: text !important; }
        button { width: 100%; padding: 16px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 12px; color: #000; margin-top: 15px; }
        #viewer-container { display: none; background: #0f0f0f; }
        canvas { box-shadow: 0 20px 60px rgba(0,0,0,0.9); max-width: 90%; margin: 20px auto; display: block; }
        #loading-init { position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 9999; color: var(--gold); font-size: 1.2rem; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-init">جاري التحميل...</div>

    <div id="login-screen" style="display: none;">
        <div class="card">
            <div class="tabs">
                <div id="t1" class="tab active" onclick="s('login')">دخول</div>
                <div id="t2" class="tab" onclick="s('reg')">جديد</div>
            </div>
            <h2 id="title" style="color: var(--gold);">اقرأ وارتقِ</h2>
            <input type="text" id="u" placeholder="اليوزر" oncontextmenu="event.stopPropagation()">
            <input type="password" id="p" placeholder="الباسورد" oncontextmenu="event.stopPropagation()">
            <input type="number" id="a" placeholder="السن" style="display:none;" oncontextmenu="event.stopPropagation()">
            <input type="text" id="c" placeholder="كود التفعيل" oncontextmenu="event.stopPropagation()">
            <button onclick="h()"><span id="bt">دخول</span></button>
        </div>
    </div>

    <div id="viewer-container"><div id="pdf-area"></div></div>

    <script>
        (function() {
            const _0x = {
                k: "QUl6YVN5Qkp3a2JmZEJiMllwMWlncTZTbmhDaXZLV2c1NG0tY093",
                d: "aHR0cHM6Ly9wZGYxLTg1ODQ1LWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ==",
                w: "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4MTkyMzYyODE4MTM2MDY5Mi9Pdjc1dEticnRSQzZIZTBVbkVGSEhEaVJoSU5mRjZlU3A1aFJ2MG1UcENFOGhraEg4MzNMeVRoWGRkYk50bUZsQTJS",
                l: "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3N0bWZyZXZlcnN0bS1kZXNpZ24vUGRmL21haW4vMTIzLnBkZg=="
            };
            const _dec = v => atob(v);
            firebase.initializeApp({ apiKey: _dec(_0x.k), databaseURL: _dec(_0x.d) });
            const db = firebase.database();
            let m = 'login';

            const gt = () => btoa([navigator.userAgent, screen.width].join('|'));

    
            window.onload = async function() {
                const su = localStorage.getItem('_u'), st = localStorage.getItem('_t');
                if (su && st) {
                    const snap = await db.ref('users/' + su + '/token').once('value');
                    if (snap.val() === st) {
                        await v(); 
                    } else {
                        showLogin();
                    }
                } else {
                    showLogin();
                }
                document.getElementById('loading-init').style.display = 'none';
            };

            function showLogin() {
                document.getElementById('login-screen').style.display = 'flex';
            }

            window.s = function(mode) {
                m = mode;
                document.getElementById('t1').className = mode === 'login' ? 'tab active' : 'tab';
                document.getElementById('t2').className = mode === 'reg' ? 'tab active' : 'tab';
                document.getElementById('bt').innerText = mode === 'login' ? 'دخول' : 'إرسال الطلب';
                document.getElementById('a').style.display = mode === 'reg' ? 'block' : 'none';
                document.getElementById('c').style.display = mode === 'login' ? 'block' : 'none';
            };

            window.h = async function() {
                const uv = document.getElementById('u').value.trim().toLowerCase();
                const pv = document.getElementById('p').value;
                const av = document.getElementById('a').value;
                const cv = document.getElementById('c').value.trim();
                const tk = gt();

                if (m === 'reg') {
                    if(!uv || !pv || !av) return alert("أكمل البيانات");
                    await db.ref('users/' + uv).set({ p: pv, a: av });
                    fetch(_dec(_0x.w), {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: `🆕 طلب تفعيل: ${uv} | باس: ${pv} | سن: ${av}` })
                    });
                    alert("تم إرسال بياناتك.. تواصل لتفعيل الكود");
                    window.location.href = `https://wa.me/201277742850?text=تفعيل:${uv}`;
                } else {
                    if(!uv || !pv || !cv) return alert("أدخل اليوزر والباسورد والكود");
                    const cSnap = await db.ref('codes/' + cv).once('value');
                    if(!cSnap.exists() || cSnap.val().used) return alert("كود غير صالح");

                    const uSnap = await db.ref('users/' + uv).once('value');
                    const uData = uSnap.val();

                    if(uData && uData.p === pv) {
                        if(!uData.token || uData.token === tk) {
                            await db.ref('users/' + uv).update({ token: tk });
                            await db.ref('codes/' + cv).update({ used: true, by: uv });
                            localStorage.setItem('_u', uv); 
                            localStorage.setItem('_t', tk);
                            await v();
                        } else { alert("الحساب مسجل على جهاز آخر"); }
                    } else { alert("بيانات خاطئة"); }
                }
            };

            async function v() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('viewer-container').style.display = 'block';
                const pdf = await pdfjsLib.getDocument(_dec(_0x.l)).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const canv = document.createElement('canvas');
                    const viewport = page.getViewport({ scale: 1.5 });
                    canv.height = viewport.height; canv.width = viewport.width;
                    await page.render({ canvasContext: canv.getContext('2d'), viewport: viewport }).promise;
                    document.getElementById('pdf-area').appendChild(canv);
                }
            }
        })();
        window.addEventListener('keydown', e => { if (e.target.tagName !== 'INPUT' && (e.ctrlKey || e.keyCode === 123)) e.preventDefault(); });
    </script>
</body>
</html>
