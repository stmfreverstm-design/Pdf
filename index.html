<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - عرض آمن</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-bg: #1a1a1a;
            --card-bg: rgba(38, 38, 38, 0.9); /* جعل الخلفية شفافة قليلاً لتظهر الصورة */
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Amiri', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            /* إضافة الصورة كخلفية أساسية */
            background-image: url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* طبقة تعتيم خفيفة فوق الصورة عشان الكلام يظهر */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        #login-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--primary-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(5px); /* تأثير زجاجي خفيف */
        }

        h2 { color: var(--primary-gold); margin-bottom: 20px; font-size: 1.6rem; text-shadow: 1px 1px 2px black; }

        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; color: var(--primary-gold); font-size: 0.85rem; font-weight: bold; }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        input:focus { outline: none; border-color: var(--primary-gold); box-shadow: 0 0 5px var(--primary-gold); }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #e2bd76; transform: scale(1.02); }

        #pdf-main-container { display: none; width: 100%; height: 100vh; flex-direction: column; background: #1a1a1a; }
        #viewerContainer { flex: 1; overflow: auto; padding: 20px 0; user-select: none; }
        canvas { display: block; margin: 0 auto 20px auto; box-shadow: 0 0 25px rgba(0,0,0,0.7); max-width: 95%; border: 1px solid #333; }
        #loading-screen { display: none; color: var(--primary-gold); margin-top: 15px; font-weight: bold; }

        @media print { body { display: none !important; } }
    </style>
</head>
<body>

    <div id="login-card">
        <h2>الدخول للمصحف الشريف</h2>
        <div class="input-group">
            <label>اسم المستخدم:</label>
            <input type="text" id="username" placeholder="أدخل اسمك">
        </div>
        <div class="input-group">
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <div class="input-group">
            <label>كود التحقق الخاص:</label>
            <input type="text" id="invite-code" placeholder="أدخل كود الوصول">
        </div>
        <button onclick="handleLogin()">فتح المصحف</button>
        <div id="loading-screen">جاري تشفير البيانات وفتح المستند...</div>
    </div>

    <div id="pdf-main-container">
        <div id="viewerContainer">
            <div id="pdf-viewer"></div>
        </div>
    </div>

    <script>
        const MASTER_INVITE_CODE = "2534gfsw26ft2r72t75e2e7#_"; 
        const USERS_LIST = [
            { name: "seif", pass: "123" },
            { name: "tarek", pass: "123" },
            { name: "000", pass: "000" }
        ];

        const PDF_URL = 'https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf';
        const PDF_REAL_PASS = '1234567891245248hgdtghnfrdvhb fzedg@#_25D';

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        window.onload = () => {
            if (localStorage.getItem('secureAccess') === 'granted') {
                showPDF();
            }
        };

        function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toLowerCase();
            const passIn = document.getElementById('password').value;
            const codeIn = document.getElementById('invite-code').value.trim();

            if (codeIn !== MASTER_INVITE_CODE) {
                alert("كود التحقق غير صحيح!");
                return;
            }

            const userMatch = USERS_LIST.find(u => u.name.toLowerCase() === userIn && u.pass === passIn);

            if (userMatch) {
                localStorage.setItem('secureAccess', 'granted');
                showPDF();
            } else {
                alert("خطأ في اسم المستخدم أو كلمة المرور");
            }
        }

        async function showPDF() {
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            
            try {
                const response = await fetch(PDF_URL);
                const data = await response.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: data, password: PDF_REAL_PASS });
                const pdfDoc = await loadingTask.promise;
                
                document.getElementById('pdf-main-container').style.display = 'flex';
                // إخفاء صورة الخلفية عند عرض الـ PDF لزيادة التركيز
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#1a1a1a";
                
                renderPages(pdfDoc);
            } catch (error) {
                alert("فشل التحقق من أمان الملف");
                localStorage.removeItem('secureAccess');
                location.reload();
            }
        }

        async function renderPages(pdfDoc) {
            const viewer = document.getElementById('pdf-viewer');
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                viewer.appendChild(canvas);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
