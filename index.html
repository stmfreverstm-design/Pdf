<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اقرأ وارتقِ</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #d4af37; --gold-hover: #f1c40f; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white; height: 100%; }
        
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover; background-position: center; position: relative;
            perspective: 1000px;
        }
        
        .card {
            position: relative; background: rgba(15, 15, 15, 0.75); padding: 40px;
            border-radius: 24px; border: 1px solid rgba(212, 175, 55, 0.2); width: 380px; text-align: center;
            backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform: translateY(0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 1s ease-out;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 35px 60px rgba(212, 175, 55, 0.15); }

        .tabs { display: flex; justify-content: center; margin-bottom: 30px; gap: 20px; }
        .tab { padding: 8px 20px; cursor: pointer; color: #777; transition: 0.4s; font-size: 16px; border-radius: 50px; background: rgba(255,255,255,0.03); }
        .tab.active { color: #000; background: var(--gold); font-weight: bold; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        .input-group { position: relative; margin: 15px 0; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0, 0, 0, 0.4); color: #fff; box-sizing: border-box; text-align: center; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--gold); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); transform: scale(1.02); }
        
        button { width: 100%; padding: 16px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 12px; color: #000; margin-top: 20px; transition: 0.4s; font-size: 17px; letter-spacing: 0.5px; position: relative; overflow: hidden; }
        button:hover { background: var(--gold-hover); transform: scale(1.03); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        button:active { transform: scale(0.98); }

        #viewer-container { display: none; background: #0f0f0f; min-height: 100vh; animation: fadeIn 0.8s ease; }
        #pdf-render-area { display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 30px; }
        canvas { box-shadow: 0 20px 60px rgba(0,0,0,0.9); max-width: 90%; border-radius: 8px; transition: transform 0.3s; }
        canvas:hover { transform: scale(1.01); }
        
        #loading-text { color: var(--gold); font-size: 14px; display: none; margin-top: 20px; font-weight: bold; letter-spacing: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .shimmer { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        button:hover .shimmer { left: 150%; transition: 0.7s; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchTab('login')">دخول</div>
                <div id="tab-register" class="tab" onclick="switchTab('register')">جديد</div>
            </div>
            <div id="form-container">
                <h2 id="form-title" style="color: var(--gold); margin-bottom: 25px; font-weight: 300;">اقرأ وارتقِ</h2>
                <div class="input-group"><input type="text" id="user" placeholder="اليوزر"></div>
                <div class="input-group"><input type="password" id="pass" placeholder="الباسورد"></div>
                <div class="input-group"><input type="number" id="age" placeholder="السن" style="display:none;"></div>
                <div class="input-group"><input type="text" id="code" placeholder="الكود"></div>
                <button id="main-btn" onclick="handleAuth()">
                    <span id="btn-text">دخول</span>
                    <div class="shimmer"></div>
                </button>
                <div id="loading-text">جاري التحقق...</div>
            </div>
        </div>
    </div>

    <div id="viewer-container"><div id="pdf-render-area"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJwkbfdBb2Yp1igq6SnhCivKWg54m-cOw",
            authDomain: "pdf1-85845.firebaseapp.com",
            databaseURL: "https://pdf1-85845-default-rtdb.firebaseio.com",
            projectId: "pdf1-85845",
            storageBucket: "pdf1-85845.firebasestorage.app",
            messagingSenderId: "657876361622",
            appId: "1:657876361622:web:8c9eb09e1d2da1d0193db7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1481923628181360692/Ov75tKbrtRC6He0UnEFHHDiRhIDNfF6eSp5hRv0mTpCE8hkhH833LyThxddbNtmFlA2R";
        
        let currentMode = 'login';

        function getStrictToken() {
            return btoa([navigator.userAgent, screen.width, screen.height, navigator.language].join('|'));
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('auto_user');
            const savedToken = localStorage.getItem('auto_token');
            if (savedUser && savedToken) {
                database.ref('sessions/' + savedUser).once('value').then((snap) => {
                    if (snap.val() === savedToken) loadSecurePDF();
                    else localStorage.clear();
                });
            }
        };

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('btn-text').innerText = mode === 'login' ? 'دخول' : 'إنشاء وإرسال';
            document.getElementById('age').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('code').style.display = mode === 'login' ? 'block' : 'none';
        }

        async function handleAuth() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const age = document.getElementById('age').value.trim();
            const c = document.getElementById('code').value.trim();
            const loading = document.getElementById('loading-text');

            if(!u || !p || (currentMode === 'register' && !age)) return;
            loading.style.display = 'block';

            if (currentMode === 'register') {
                await database.ref('users/' + u).set({ password: p, age: age });
                fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: `🆕 **حساب جديد**\n👤 الاسم: ${u}\n🔑 الباسورد: ${p}\n🎂 السن: ${age}` })
                });
                alert("تم الإرسال.. تواصل مع الإدارة");
                window.location.href = `https://wa.me/201277742850?text=تفعيل:${u}-${age}`;
            } else {
                database.ref('users/' + u).once('value').then((snap) => {
                    const data = snap.val();
                    if(data && data.password === p && c === "2534gfsw26ft2r72t75e2e7#_") {
                        const token = getStrictToken();
                        database.ref('sessions/' + u).once('value').then((sess) => {
                            if (!sess.val() || sess.val() === token) {
                                database.ref('sessions/' + u).set(token).then(() => {
                                    localStorage.setItem('auto_user', u);
                                    localStorage.setItem('auto_token', token);
                                    loadSecurePDF();
                                });
                            } else {
                                alert("الجهاز مسجل مسبقاً");
                                loading.style.display = 'none';
                            }
                        });
                    } else {
                        alert("خطأ في البيانات");
                        loading.style.display = 'none';
                    }
                });
            }
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'block';
            const pdf = await pdfjsLib.getDocument('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf').promise;
            const area = document.getElementById('pdf-render-area');
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const canv = document.createElement('canvas');
                const view = page.getViewport({ scale: 1.5 });
                canv.height = view.height; canv.width = view.width;
                await page.render({ canvasContext: canv.getContext('2d'), viewport: view }).promise;
                area.appendChild(canv);
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            if (e.ctrlKey || e.keyCode === 123) e.preventDefault();
        });
    </script>
</body>
</html>
