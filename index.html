<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - دخول آمن</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; --card-bg: rgba(20, 20, 20, 0.85); }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; height: 100%; }
        
        /* شاشة تسجيل الدخول مع الصورة الخلفية الجديدة */
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            /* استبدال الخلفية بالصورة المطلوبة مباشرة */
            background-image: url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover; background-position: center; position: relative;
        }
        
        /* طبقة حماية داكنة فوق الصورة لزيادة وضوح النص */
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); }
        
        /* بطاقة تسجيل الدخول مع تأثير الضبابية (Blur) */
        .card {
            position: relative; background: var(--card-bg); padding: 30px;
            border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.3); width: 360px; text-align: center;
            backdrop-filter: blur(10px); /* تأثير الضبابية الخلفي */
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .tab { padding: 12px; cursor: pointer; color: #aaa; width: 50%; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 15px; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: rgba(0, 0, 0, 0.5); color: #fff; box-sizing: border-box; text-align: center; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--gold); background: rgba(0, 0, 0, 0.8); }
        
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #1a1a1a; margin-top: 15px; transition: 0.3s; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #b08d4a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }

        #viewer-container { display: none; background: #111; min-height: 100vh; position: relative; }
        #pdf-render-area { display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        canvas { margin-bottom: 30px; box-shadow: 0 0 40px rgba(0,0,0,0.8); max-width: 95%; border: 1px solid #222; }
        
        #loading-text { color: var(--gold); font-size: 14px; display: none; margin-top: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @media print { body { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchTab('login')">دخول</div>
                <div id="tab-register" class="tab" onclick="switchTab('register')">إنشاء حساب</div>
            </div>
            <div id="form-container">
                <h3 id="form-title" style="color: var(--gold); margin: 0 0 20px 0; font-weight: 300; letter-spacing: 1px;">تسجيل دخول</h3>
                <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
                <input type="password" id="pass" placeholder="كلمة المرور" autocomplete="off">
                <input type="number" id="age" placeholder="السن (العمر)" style="display:none;" autocomplete="off">
                <input type="text" id="code" placeholder="كود التحقق الخاص بك" autocomplete="off">
                <button id="main-btn" onclick="handleAuth()">دخول آمن</button>
                <div id="loading-text">جاري التحقق...</div>
            </div>
        </div>
    </div>

    <div id="viewer-container"><div id="pdf-render-area"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJwkbfdBb2Yp1igq6SnhCivKWg54m-cOw",
            authDomain: "pdf1-85845.firebaseapp.com",
            databaseURL: "https://pdf1-85845-default-rtdb.firebaseio.com",
            projectId: "pdf1-85845",
            storageBucket: "pdf1-85845.firebasestorage.app",
            messagingSenderId: "657876361622",
            appId: "1:657876361622:web:8c9eb09e1d2da1d0193db7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1481923628181360692/Ov75tKbrtRC6He0UnEFHHDiRhIDNfF6eSp5hRv0mTpCE8hkhH833LyThxddbNtmFlA2R";
        
        let currentMode = 'login';

        function getStrictToken() {
            return btoa([navigator.userAgent, screen.width, screen.height, navigator.language].join('|'));
        }

        window.onload = function() {
            const savedUser = localStorage.getItem('auto_user');
            const savedToken = localStorage.getItem('auto_token');

            if (savedUser && savedToken) {
                document.getElementById('loading-text').style.display = 'block';
                document.getElementById('loading-text').innerText = "جاري الدخول التلقائي...";
                
                database.ref('sessions/' + savedUser).once('value').then((snap) => {
                    if (snap.val() === savedToken) {
                        loadSecurePDF();
                    } else {
                        localStorage.clear();
                        document.getElementById('loading-text').style.display = 'none';
                    }
                });
            }
        };

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('form-title').innerText = mode === 'login' ? 'تسجيل دخول' : 'إنشاء حساب جديد';
            document.getElementById('main-btn').innerText = mode === 'login' ? 'دخول آمن' : 'تسجيل وإرسال للواتساب';
            document.getElementById('age').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('code').style.display = mode === 'login' ? 'block' : 'none';
        }

        async function handleAuth() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const age = document.getElementById('age').value.trim();
            const c = document.getElementById('code').value.trim();
            const loading = document.getElementById('loading-text');

            if(!u || !p || (currentMode === 'register' && !age)) return alert("يرجى إكمال جميع الحقول المطلوب");
            loading.style.display = 'block';

            if (currentMode === 'register') {
                await database.ref('users/' + u).set({ password: p, age: age });
                fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: `🆕 **حساب جديد مكتمل**\n👤 الاسم: ${u}\n🔑 الباسورد: ${p}\n🎂 السن: ${age}` })
                });
                alert("تم تسجيل الحساب! تواصل مع الإدارة الآن لتفعيله.");
                window.location.href = `https://wa.me/201277742850?text=أريد تفعيل حسابي:\nاليوزر: ${u}\nالسن: ${age}`;
                loading.style.display = 'none';
            } else {
                database.ref('users/' + u).once('value').then((snap) => {
                    const data = snap.val();
                    if(!data) { alert("اليوزر غير موجود، قم بإنشاء حساب أولاً."); loading.style.display = 'none'; }
                    else if (data.password !== p) { alert("كلمة المرور غير صحيحة! ❌"); loading.style.display = 'none'; }
                    else if (c !== "2534gfsw26ft2r72t75e2e7#_") { alert("كود التحقق غير صحيح."); loading.style.display = 'none'; }
                    else {
                        const token = getStrictToken();
                        database.ref('sessions/' + u).once('value').then((sess) => {
                            if (!sess.val() || sess.val() === token) {
                                database.ref('sessions/' + u).set(token).then(() => {
                                    localStorage.setItem('auto_user', u);
                                    localStorage.setItem('auto_token', token);
                                    loadSecurePDF();
                                });
                            } else {
                                alert("عذراً، هذا الحساب مفتوح على جهاز آخر!");
                                loading.style.display = 'none';
                            }
                        });
                    }
                });
            }
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'block';
            const pdf = await pdfjsLib.getDocument('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf').promise;
            const area = document.getElementById('pdf-render-area');
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const canv = document.createElement('canvas');
                const view = page.getViewport({ scale: 1.5 });
                canv.height = view.height; canv.width = view.width;
                await page.render({ canvasContext: canv.getContext('2d'), viewport: view }).promise;
                area.appendChild(canv);
            }
        }

        // منع الحركات غير المصرح بها
        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && ['s','p','u','i','j','c'].includes(e.key.toLowerCase())) e.preventDefault();
            if (e.keyCode === 123) e.preventDefault();
        });
    </script>
</body>
</html>
