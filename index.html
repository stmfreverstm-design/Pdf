<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - نظام الحماية المطور</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover; position: relative;
        }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
        
        .card {
            position: relative; background: rgba(38,38,38,0.9); padding: 30px;
            border-radius: 15px; border: 1px solid var(--gold); width: 350px; text-align: center;
            backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #1a1a1a; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b08d4a; transform: scale(1.02); }

        #viewer-container { display: none; background: #222; min-height: 100vh; position: relative; }
        
        #protection-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0); pointer-events: all;
        }

        #pdf-render-area {
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }
        canvas { margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.7); max-width: 98%; border: 1px solid #333; }

        #loading-text { color: var(--gold); font-weight: bold; display: none; margin-top: 15px; font-size: 14px; }
        
        @media print { body { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <h2 style="color: var(--gold); margin-top: 0;">تسجيل الدخول</h2>
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="pass" placeholder="كلمة المرور" autocomplete="off">
            <input type="text" id="code" placeholder="كود التحقق" autocomplete="off">
            <button onclick="checkAccess()">دخول آمن</button>
            <div id="loading-text">جاري فحص بصمة الجهاز...</div>
        </div>
    </div>

    <div id="viewer-container">
        <div id="protection-layer"></div>
        <div id="pdf-render-area"></div>
    </div>

    <script>
        // 1. إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBJwkbfdBb2Yp1igq6SnhCivKWg54m-cOw",
            authDomain: "pdf1-85845.firebaseapp.com",
            databaseURL: "https://pdf1-85845-default-rtdb.firebaseio.com",
            projectId: "pdf1-85845",
            storageBucket: "pdf1-85845.firebasestorage.app",
            messagingSenderId: "657876361622",
            appId: "1:657876361622:web:8c9eb09e1d2da1d0193db7",
            measurementId: "G-V18B718NTM"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const PDF_URL = 'https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // دالة لإنشاء بصمة فريدة للجهاز بناءً على مواصفاته
        function getDeviceToken() {
            const nav = window.navigator;
            const screenInfo = window.screen;
            return btoa(nav.userAgent + nav.language + screenInfo.width + screenInfo.height + screenInfo.colorDepth);
        }

        window.onload = () => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                const u = localStorage.getItem('currentUser');
                const t = localStorage.getItem('deviceToken');
                
                // فحص دائم عند فتح الصفحة للتأكد من عدم دخول جهاز آخر
                database.ref('sessions/' + u).once('value', (snapshot) => {
                    if (snapshot.val() === t) {
                        loadSecurePDF();
                    } else {
                        alert("تم تسجيل الدخول من جهاز آخر لهذا الحساب.");
                        logout();
                    }
                });
            }
        };

        async function checkAccess() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value.trim();
            const loadingText = document.getElementById('loading-text');

            const isValidUser = (c === "2534gfsw26ft2r72t75e2e7#_" && 
                                ((u === "seif" || u === "tarek" || u === "000") && p === "123") || 
                                (u === "000" && p === "000"));

            if (isValidUser) {
                const deviceToken = getDeviceToken();
                loadingText.innerText = "جاري التحقق من ملكية الجهاز...";
                loadingText.style.display = 'block';

                // الاتصال بالقاعدة للتحقق من الجهاز المسجل
                database.ref('sessions/' + u).once('value').then((snapshot) => {
                    const registeredToken = snapshot.val();

                    if (!registeredToken || registeredToken === deviceToken) {
                        // الحساب جديد أو نفس الجهاز المسجل
                        database.ref('sessions/' + u).set(deviceToken).then(() => {
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('currentUser', u);
                            localStorage.setItem('deviceToken', deviceToken);
                            loadSecurePDF();
                        });
                    } else {
                        // جهاز مختلف تماماً
                        loadingText.style.display = 'none';
                        alert("عذراً، هذا الحساب مفعل على جهاز آخر. لا يمكن استخدامه على جهازين في نفس الوقت.");
                    }
                }).catch((error) => {
                    loadingText.style.display = 'none';
                    alert("خطأ في الاتصال بالخادم: " + error.message);
                });
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'block';

            try {
                const loadingTask = pdfjsLib.getDocument(PDF_URL);
                const pdf = await loadingTask.promise;
                const container = document.getElementById('pdf-render-area');

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    container.appendChild(canvas);
                }
            } catch (e) {
                alert("حدث خطأ أثناء تحميل الملف");
                logout();
            }
        }

        // منع النسخ والتصوير
        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && ['s','p','u','i','j','c'].includes(e.key.toLowerCase())) e.preventDefault();
            if (e.keyCode === 123) e.preventDefault();
        });

        // كشف فتح أدوات المطور (F12)
        setInterval(() => {
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
                document.body.innerHTML = "Security Triggered";
                location.reload();
            }
        }, 500);
    </script>
</body>
</html>
