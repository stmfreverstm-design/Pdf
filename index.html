<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - حماية صارمة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover; position: relative;
        }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.85); }
        
        .card {
            position: relative; background: rgba(30,30,30,0.95); padding: 25px;
            border-radius: 15px; border: 1px solid var(--gold); width: 350px; text-align: center;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { padding: 10px; cursor: pointer; color: #888; transition: 0.3s; width: 50%; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #1a1a1a; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b08d4a; }

        #viewer-container { display: none; background: #222; min-height: 100vh; }
        #pdf-render-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        canvas { margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.7); max-width: 95%; }
        
        #loading-text { color: var(--gold); font-size: 14px; display: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchTab('login')">دخول</div>
                <div id="tab-register" class="tab" onclick="switchTab('register')">إنشاء حساب</div>
            </div>

            <div id="form-container">
                <h3 id="form-title" style="color: var(--gold); margin: 0 0 15px 0;">تسجيل دخول</h3>
                <input type="text" id="user" placeholder="اسم المستخدم">
                <input type="password" id="pass" placeholder="كلمة المرور">
                <input type="text" id="code" placeholder="كود التحقق الخاص بك">
                
                <button id="main-btn" onclick="handleAuth()">دخول</button>
                <div id="loading-text">جاري التحقق...</div>
            </div>
        </div>
    </div>

    <div id="viewer-container">
        <div id="pdf-render-area"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJwkbfdBb2Yp1igq6SnhCivKWg54m-cOw",
            authDomain: "pdf1-85845.firebaseapp.com",
            databaseURL: "https://pdf1-85845-default-rtdb.firebaseio.com",
            projectId: "pdf1-85845",
            storageBucket: "pdf1-85845.firebasestorage.app",
            messagingSenderId: "657876361622",
            appId: "1:657876361622:web:8c9eb09e1d2da1d0193db7",
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1481923628181360692/Ov75tKbrtRC6He0UnEFHHDiRhIDNfF6eSp5hRv0mTpCE8hkhH833LyThxddbNtmFlA2R";
        const PDF_URL = 'https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf';
        
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('form-title').innerText = mode === 'login' ? 'تسجيل دخول' : 'إنشاء حساب جديد';
            document.getElementById('main-btn').innerText = mode === 'login' ? 'دخول' : 'إرسال الطلب';
            document.getElementById('code').style.display = mode === 'login' ? 'block' : 'none';
        }

        async function handleAuth() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value.trim();
            const loading = document.getElementById('loading-text');

            if(!u || !p) return alert("يرجى إدخال اليوزر والباسورد");

            loading.style.display = 'block';

            if (currentMode === 'register') {
                // حفظ البيانات في قاعدة البيانات لغرض التحقق اللاحق
                await database.ref('users/' + u).set({ password: p, active: false });

                // إرسال لـ Discord
                const msg = { content: `🆕 **طلب تفعيل حساب**\n👤 اليوزر: ${u}\n🔑 الباسورد: ${p}` };
                await fetch(DISCORD_WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(msg) });

                alert("تم إرسال الطلب. تواصل مع الإدارة لتفعيل حسابك وإعطائك الكود.");
                window.location.href = `https://wa.me/201277742850?text=أريد تفعيل حسابي: ${u}`;
                loading.style.display = 'none';

            } else {
                // عملية تسجيل الدخول الحقيقية
                database.ref('users/' + u).once('value').then((snapshot) => {
                    const userData = snapshot.val();
                    const deviceToken = btoa(navigator.userAgent + screen.width);

                    // 1. هل المستخدم موجود أصلاً؟
                    if (!userData) {
                        alert("اسم المستخدم غير موجود");
                    } 
                    // 2. هل الباسورد صح؟
                    else if (userData.password !== p) {
                        alert("كلمة المرور خاطئة ❌");
                    }
                    // 3. هل كود التحقق صح؟ (الكود العام اللي حددته أنت)
                    else if (c !== "2534gfsw26ft2r72t75e2e7#_") {
                        alert("كود التحقق غير صحيح");
                    }
                    else {
                        // 4. فحص الجهاز (بصمة الجهاز)
                        database.ref('sessions/' + u).once('value').then((sessSnap) => {
                            const registeredToken = sessSnap.val();
                            if (!registeredToken || registeredToken === deviceToken) {
                                database.ref('sessions/' + u).set(deviceToken);
                                localStorage.setItem('isLoggedIn', 'true');
                                loadSecurePDF();
                            } else {
                                alert("هذا الحساب يعمل على جهاز آخر حالياً!");
                            }
                        });
                    }
                    loading.style.display = 'none';
                });
            }
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'block';
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
            const container = document.getElementById('pdf-render-area');
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                container.appendChild(canvas);
            }
        }
    </script>
</body>
</html>
