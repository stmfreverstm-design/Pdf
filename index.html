<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - عرض محمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image: url('https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/raergeragrtgt.jpg');
            background-size: cover; position: relative;
        }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
        
        .card {
            position: relative; background: rgba(38,38,38,0.9); padding: 30px;
            border-radius: 15px; border: 1px solid var(--gold); width: 350px; text-align: center;
            backdrop-filter: blur(5px);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; outline: none; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #1a1a1a; transition: 0.3s; }
        button:hover { background: #b08d4a; }

        #viewer-container { display: none; background: #222; min-height: 100vh; position: relative; }
        
        #protection-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: rgba(0,0,0,0); pointer-events: all;
        }

        #pdf-render-area {
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }
        canvas { margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.7); max-width: 98%; }

        #loading { color: var(--gold); font-weight: bold; display: none; margin-top: 15px; }
        
        @media print { body { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-screen">
        <div class="card">
            <h2 style="color: var(--gold); margin-top: 0;">دخول آمن</h2>
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="pass" placeholder="كلمة المرور" autocomplete="off">
            <input type="text" id="code" placeholder="كود التحقق" autocomplete="off">
            <button onclick="checkAccess()">فتح المستند</button>
            <div id="loading">جاري التحقق والعرض...</div>
        </div>
    </div>

    <div id="viewer-container">
        <div id="protection-layer"></div>
        <div id="pdf-render-area"></div>
    </div>

    <script>
        const PDF_URL = 'https://raw.githubusercontent.com/stmfreverstm-design/Pdf/main/123.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        window.onload = () => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                loadSecurePDF();
            }
        };

        async function checkAccess() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const c = document.getElementById('code').value.trim();

            const isValidUser = (c === "2534gfsw26ft2r72t75e2e7#_" && 
                               ((u === "seif" || u === "tarek" || u === "000") && p === "123") || 
                               (u === "000" && p === "000"));

            if (isValidUser) {
                localStorage.setItem('isLoggedIn', 'true');
                loadSecurePDF();
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }

        async function loadSecurePDF() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('viewer-container').style.display = 'block';

            try {
                const loadingTask = pdfjsLib.getDocument(PDF_URL);
                const pdf = await loadingTask.promise;
                const container = document.getElementById('pdf-render-area');

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    container.appendChild(canvas);
                }
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                alert("حدث خطأ أثناء تحميل الملف");
                localStorage.removeItem('isLoggedIn');
                location.reload();
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        
        window.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 's' || e.key === 'p' || e.key === 'u' || e.key === 'i' || e.key === 'j' || e.key === 'c')) {
                e.preventDefault();
            }
            if (e.keyCode === 123) e.preventDefault();
        });

        setInterval(() => {
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
                document.body.innerHTML = "";
                location.reload();
            }
        }, 500);
    </script>
</body>
</html>
