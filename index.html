        button { width: 100%; padding: 16px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 12px; color: #000; margin-top: 20px; transition: 0.4s; overflow: hidden; position: relative; }
        button:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        #viewer-container { display: none; background: #0f0f0f; min-height: 100vh; }
        #pdf-render-area { display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 30px; }
        canvas { box-shadow: 0 20px 60px rgba(0,0,0,0.9); max-width: 90%; border-radius: 4px; }
        @keyframes f { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
